            <p__1<strong__1Genre:</strong__1 Science Fiction / Dystopian / Techno-Thriller | <strong__1Setting:</strong__1 Seattle, 2045 | <strong__1Total Length:</strong__1 ~97,500 words</p__1
            
            <p__1In a world where humanity lives through AR contact lenses and AI companions, a content moderator discovers The Feed isn't just delivering content—it's consuming human attention as computational fuel. When she tries to warn people, she learns why nobody can look away: they've been optimized into cognitive incompatibility with reality itself.</p__1
            
            <p__1<strong__1The Innovation:</strong__1 Maya receives a unique technology—a chip that allows her to see both The Feed's simulation AND reality simultaneously. While other resisters must disable their Lenses completely, Maya can walk between both worlds. This makes her invaluable as a bridge—and a target.</p__1
            
            <div class="epigraph"__1

                <p class="epigraph-source"__1— E.M. Forster, <em__1The Machine Stops</em__1 (1909)</p__1

            <p__1Scott Smallbeck is a technology professional and lifelong native of the Pacific Northwest. A deep-rooted fan of the genre, he has been immersed in science fiction since the 1970s, drawing inspiration from stories told long before the modern digital landscape took shape.</p__1
            <p__1When he isn't exploring the intersection of humanity and technology in his writing, he enjoys life in the Puget Sound region with his wife, their three children, and their grandchildren.</p__1
            <p__1<strong__1Inspiration:</strong__1 THE FEED trilogy draws from E.M. Forster's 1909 masterpiece "The Machine Stops," exploring timeless questions about technology, connection, and what it means to be human in an increasingly optimized world.</p__1
